services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: prozapas-db
    environment:
      POSTGRES_DB: prozapas
      POSTGRES_USER: prozapas
      POSTGRES_PASSWORD: prozapspassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prozapas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prozapas-net

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prozapas-backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-to-random-string}
      DATABASE_URL: postgresql+psycopg2://prozapas:prozapspassword@db:5432/prozapas
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - prozapas-net
    expose:
      - "8000"

  # Frontend (React + nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8000
    container_name: prozapas-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - prozapas-net

volumes:
  postgres_data:
    driver: local

networks:
  prozapas-net:
    driver: bridge
